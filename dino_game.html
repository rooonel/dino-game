<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Dino</title>

<style>

*{
margin:0;
box-sizing:border-box;
}

body{
background:#edf2f7;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

font-family:Arial;
}

#game{

width:900px;

height:300px;

background:white;

border:4px solid black;

position:relative;

overflow:hidden;

}

#score{

position:absolute;

top:10px;

right:20px;

font-size:26px;

}

#high{

position:absolute;

top:40px;

right:20px;

opacity:.6;

}

#dino{

position:absolute;

left:100px;

bottom:40px;

width:60px;

height:60px;

background:#222;

border-radius:10px;

}

#eye{

position:absolute;

right:10px;

top:10px;

width:8px;

height:8px;

background:white;

border-radius:50%;

}

#cactus{

position:absolute;

bottom:40px;

left:900px;

width:30px;

height:60px;

background:#2ecc71;

border-radius:4px;

}

.cloud{

position:absolute;

top:60px;

font-size:50px;

opacity:.35;

}

#ground{

position:absolute;

bottom:0;

width:100%;

height:40px;

background:#ddd;

}

#message{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

font-size:42px;

display:none;

text-align:center;

}

</style>
</head>

<body>

<div id="game">

<div id="score">0</div>

<div id="high">HI 0</div>

<div id="dino">
<div id="eye"></div>
</div>

<div id="cactus"></div>

<div class="cloud" id="cloud1">☁️</div>
<div class="cloud" id="cloud2">☁️</div>

<div id="ground"></div>

<div id="message">
💥 GAME OVER
<br>
Press R
</div>

</div>

<script>

const dino=
document.getElementById("dino")

const cactus=
document.getElementById("cactus")

const scoreUI=
document.getElementById("score")

const highUI=
document.getElementById("high")

const msg=
document.getElementById("message")

const c1=
document.getElementById("cloud1")

const c2=
document.getElementById("cloud2")

let y=0

let velocity=0

let jumping=false

let cactusX=900

let score=0

let speed=8

let running=true

let cloud1=700

let cloud2=300

let high=
Number(
localStorage.high
)||0

highUI.textContent=
"HI "+high

function jump(){

if(
jumping||
!running
)
return

velocity=18

jumping=true

}

function reset(){

y=0

velocity=0

jumping=false

cactusX=900

score=0

speed=8

running=true

msg.style.display=
"none"

randomCactus()

loop()

}

function randomCactus(){

cactus.style.height=
(
40+
Math.random()*50
)+"px"

}

function gameOver(){

running=false

msg.style.display=
"block"

if(
score>high
){

high=score

localStorage.high=
high

}

highUI.textContent=
"HI "+high

}

document.addEventListener(
"keydown",
e=>{

if(
e.code==="Space"
){

e.preventDefault()

jump()

}

if(
e.key.toLowerCase()==="r"
){

reset()

}

}
)

function loop(){

if(
!running
)
return

velocity-=1

y+=velocity

if(
y<=0
){

y=0

velocity=0

jumping=false

}

dino.style.bottom=
(
40+y
)+"px"

cactusX-=speed

if(
cactusX<-60
){

cactusX=
950

score++

speed+=0.15

randomCactus()

}

cactus.style.left=
cactusX+"px"

cloud1-=1

cloud2-=.5

if(
cloud1<-150
)
cloud1=950

if(
cloud2<-150
)
cloud2=950

c1.style.left=
cloud1+"px"

c2.style.left=
cloud2+"px"

let cactusH=
parseInt(
cactus.style.height
)

if(

cactusX<150&&
cactusX>80&&
y<
(cactusH-10)

){

gameOver()

return

}

scoreUI.textContent=
score

requestAnimationFrame(
loop
)

}

randomCactus()

loop()

</script>

</body>
</html>
